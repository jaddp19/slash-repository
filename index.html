<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relapse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(to right, #f8f9fa, #e9ecef);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .buttons {
      display: flex;
      gap: 20px;
    }
    button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #yesBtn {
      background-color: #28a745;
      color: white;
    }
    #noBtn {
      background-color: #dc3545;
      color: white;
    }
    #advice {
      margin-top: 30px;
      font-size: 1.2rem;
      color: #343a40;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Have you moved on?</h1>
  <div class="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>
  <div id="advice"></div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const advice = document.getElementById('advice');

    let noSize = 1; // scale factor for shrinking

    noBtn.addEventListener('click', () => {
      noSize -= 0.1;
      if (noSize <= 0.2) {
        noSize = 0.2; // minimum size
      }
      noBtn.style.transform = `scale(${noSize})`;
    });

    yesBtn.addEventListener('click', () => {
      advice.style.display = 'block';
      advice.textContent = "Healing takes time, but choosing to move forward opens the door to peace and new beginnings.";
    });
  </script>
</body>
</html>
